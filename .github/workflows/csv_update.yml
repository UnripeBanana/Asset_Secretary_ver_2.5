name: Update CSV

on:
  workflow_dispatch:

  schedule:
    # 평일(월~금) 16:10 KST = 07:10 UTC
    - cron: "0 */6 * * 1-5"

jobs:
  save-history:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Save History
        run: python3 csv_main.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DOMESTIC_STOCK_INFO_DB_ID: ${{ secrets.NOTION_DOMESTIC_STOCK_INFO_DB_ID }}
          NOTION_NET_PROFIT_DB_ID: ${{ secrets.NOTION_NET_PROFIT_DB_ID }}
          NOTION_DOMESTIC_STOCK_TRADE_DB_ID: ${{ secrets.NOTION_DOMESTIC_STOCK_TRADE_DB_ID }}
          NOTION_DOMESTIC_STOCK_DIVIDEND_DB_ID: ${{ secrets.NOTION_DOMESTIC_STOCK_DIVIDEND_DB_ID }}
          NOTION_KRX_GOLD_INFO_DB_ID: ${{ secrets.NOTION_KRX_GOLD_INFO_DB_ID }}
          NOTION_KRX_GOLD_TRADE_DB_ID: ${{ secrets.NOTION_KRX_GOLD_TRADE_DB_ID }}
          NOTION_DOMESTIC_BOND_ETF_TRADE_DB_ID: ${{ secrets.NOTION_DOMESTIC_BOND_ETF_TRADE_DB_ID }}
          NOTION_DOMESTIC_BOND_ETF_INFO_DB_ID: ${{ secrets.NOTION_DOMESTIC_BOND_ETF_INFO_DB_ID }}

      - name: Commit and Push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add domestic_stock_info/csv/price_history.csv
          git add krx_gold_info/csv/price_history.csv
          git add domestic_bond_etf_info/csv/price_history.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TODAY=$(date +'%Y-%m-%d')
      
            git commit -m "Daily market history (${TODAY})"
            git push
          fi
